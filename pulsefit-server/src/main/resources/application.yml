spring:
  application:
    name: pulsefit
  #配置数据库的连接信息
  datasource:
    url: jdbc:mysql://localhost:3306/pulsefit
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  # 禁用默认的静态资源处理，让所有请求都经过过滤器
  web:
    resources:
      add-mappings: false
  # 找不到handler时抛出异常以便返回404
  mvc:
    throw-exception-if-no-handler-found: true


#Mybatis的相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名映射开关
    map-underscore-to-camel-case: true
#配置事务管理日志级别
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-beijing.aliyuncs.com}
    bucketName: ${ALIYUN_OSS_BUCKET:your-bucket}
    region: ${ALIYUN_OSS_REGION:cn-beijing}




